<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Timeline Ulama</title>
    <!-- Memanggil CSS lokal -->
    <link rel="stylesheet" href="leaflet.css" />
    <style>
        #map { 
    height: 100vh; /* Tinggi penuh sesuai layar browser */
    width: 100%; 
    background: #ffffff; /* Beri warna background kontainer */
    margin: 1;
    padding: 1;
}
body, html { margin: 0; padding: 0; height: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
   
    <!-- Memanggil JS lokal -->
    <script src="leaflet.js"></script>
    <script>
    var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -3,
    });
    var bounds = [[0,0], [14536,16383]];
    var image = L.imageOverlay('asset.webp', bounds).addTo(map);
    map.fitBounds(bounds);
    </script>
</body>
</html>
